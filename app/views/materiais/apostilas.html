<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostilas - Eduprep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="../../controller/comentarios/apostilas.js" type="module" defer></script>
    <script src="../../controller/conteudo/apostilas.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../controller/tailwind.js" defer></script>
    <link rel="stylesheet" href="../styles/materiais.css">
</head>
<body class="bg-gray-50">
    <!-- Cabeçalho -->
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="../index.html" class="flex items-center space-x-3">
                <div class="bg-primary w-10 h-10 rounded-lg flex items-center justify-center">
                    <span class="text-white text-lg font-bold">E</span>
                </div>
                <span class="text-xl font-bold text-primary">Eduprep</span>
            </a>
            
            <!-- Perfil do usuário -->
            <div class="flex items-center space-x-4">
                <a href="../user/painel.html" class="flex items-center group">
                    <div class="mr-2 text-gray-600 group-hover:text-primary transition">
                        <i class="fas fa-user"></i>
                    </div>
                    <img src="images/pngtree-user-icon-png-image_1796659-removebg-preview.png" 
                         alt="Perfil do usuário" 
                         class="user-icon w-10 h-10 rounded-full border-2 border-blue-100">
                </a>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800">Apostilas</h1>
            <p class="text-gray-600 mt-2">Materiais de estudo completos para seu aprendizado</p>
        </div>
        
        <!-- Seção de Apostilas -->
        <div id="apostilas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- Seção de Comentários -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Comentários</h2>
            
            <!-- Formulário de Comentário -->
            <form id="form_apostilas" method="post" class="mb-8">
                <div class="flex gap-2">
                    <input type="text" 
                           class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" 
                           placeholder="Digite um comentário" 
                           name='conteudo' 
                           required>
                    <button type='submit' class="bg-primary hover:bg-secondary text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                        <i class="fas fa-paper-plane mr-2"></i> Enviar
                    </button>
                </div>
            </form>
            
            <!-- Lista de Comentários -->
            <div id="comentarios" class="space-y-6"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
