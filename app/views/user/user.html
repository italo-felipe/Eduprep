<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eduprep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="../../controller/users/login.js" defer></script>
    <script src="../../controller/tailwind.js" defer></script>
   <link rel="stylesheet" href="../styles/user.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="../index.html">
                <div class="mx-auto bg-gray-200 border-2 border-dashed rounded-xl w-16 h-16 flex items-center justify-center mb-4">
                    <span class="text-blue-500 text-xl font-bold">LOGO</span>
                </div>
                <h1 class="text-3xl font-bold text-primary">Eduprep</h1>
            </a>
        </div>

        <!-- Card de login -->
        <div class="bg-white shadow-xl rounded-2xl overflow-hidden">
            <div class="p-2 bg-primary"></div>
            <div class="p-8">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Bem-vindo de volta!</h2>
                    <p class="text-gray-600 mt-1">Faça login para continuar</p>
                </div>
                
                <form id="form" method="post">
                    <div class="mb-4">
                        <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
                        <input type="email" id="email" name="email" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    
                    <div class="mb-6">
                        <label for="password" class="block text-gray-700 font-medium mb-2">Senha</label>
                        <input type="password" id="password" name="password" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    
                    <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
                    </button>
                </form>
                
                <div class="mt-6 text-center space-y-3">
                    <p class="text-gray-600">Ainda não é cadastrado? 
                        <a href="cadastro.html" class="text-primary font-semibold hover:text-secondary transition">Cadastre-se</a>
                    </p>
                    <a href="esqueceusenha.html" class="text-primary font-semibold hover:text-secondary transition block">
                        Esqueceu a senha?
                    </a>
                    <a href="../index.html" class="text-gray-600 hover:text-primary transition inline-block mt-2">
                        <i class="fas fa-arrow-left mr-1"></i> Voltar
                    </a>
                </div>
                
                <div id="alert" class="mt-4"></div>
            </div>
        </div>
    </div>
    <script src="../../controller/user_cotroller.js" defer></script>
</body>
</html>
