<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Usuário - Eduprep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="../../controller/users/painel.js" defer></script>
    <script src="../../controller/tailwind.js" defer></script>
    <link rel="stylesheet" href="../../views/styles/painel.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="../index.html">
                <div class="mx-auto bg-white rounded-xl shadow-md p-3 inline-block mb-4">
                    <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 w-16 h-16 flex items-center justify-center">
                        <span class="text-primary text-2xl font-bold">EP</span>
                    </div>
                </div>
                <h1 class="text-3xl font-bold text-primary">Eduprep</h1>
            </a>
        </div>

        <!-- Card de Perfil -->
        <div class="profile-card bg-white">
            <div class="profile-header py-6 text-center">
                <div class="mx-auto bg-white w-24 h-24 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-user text-primary text-4xl"></i>
                </div>
            </div>
            
            <div class="p-6">
                <!-- Informações do Usuário -->
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2" id="user-name"></h2>
                    <p class="text-gray-600" id="user-email"></p>
                </div>
                

                <a href="../index.html" 
                   class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg flex items-center justify-center transition">
                    <i class="fas fa-sign-out-alt mr-2"></i> Voltar
                </a>
            </div>
        </div>

        <!-- Mensagem informativa -->
        <div class="mt-6 text-center text-gray-500 text-sm">
            <p>Este painel exibe apenas informações básicas do usuário</p>
        </div>
    </div>
</body>
</html>
